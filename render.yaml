# Render Blueprint for drug-cell-viz.
#
# One-click deploy: push this file to GitHub, then in the Render dashboard:
#   New → Blueprint → connect this repo.
#
# Provisions:
#   - drug-cell-viz-redis   Managed Key-Value (Redis) for caching + rate limit
#   - drug-cell-viz-api     FastAPI web service (persistent disk for blob cache)
#   - drug-cell-viz-web     Next.js frontend
#   - drug-cell-viz-db      Managed Postgres
#
# The ARQ worker is NOT provisioned here. The patient-facing /api/bc/analyze
# flow is fully synchronous (analysis completes within the request), and two
# Render services cannot share a single persistent disk. If/when the legacy
# /api/jobs async path becomes needed, switch blob storage to S3/R2 and add a
# worker service then.
#
# After the initial deploy, set NEXT_PUBLIC_API_URL on the web service to the
# actual API service URL (Render assigns https://drug-cell-viz-api.onrender.com
# by default). See README for the exact one-time step.

services:
  # --- Managed Redis (Render Key-Value) ---
  - type: redis
    name: drug-cell-viz-redis
    plan: free
    ipAllowList: []   # only private networking between Render services

  # --- API ---
  - type: web
    name: drug-cell-viz-api
    runtime: docker
    # Docker paths are interpreted relative to rootDir. Keep it simple: set
    # rootDir to apps/api and reference the Dockerfile at the root of it.
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: api-blobs
      mountPath: /data/blobs
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drug-cell-viz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: drug-cell-viz-redis
          property: connectionString
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_STORAGE_ROOT
        value: /data/blobs
      - key: PUBLIC_BASE_URL
        # Render substitutes $RENDER_EXTERNAL_URL at runtime with the service's
        # public URL, so generated blob links point to the right host.
        value: $RENDER_EXTERNAL_URL
      - key: LOG_LEVEL
        value: INFO
      - key: USE_MODAL_DOCKING
        value: "false"
      - key: RATE_LIMIT_JOBS_PER_HOUR
        value: "100"

  # --- Frontend ---
  - type: web
    name: drug-cell-viz-web
    runtime: node
    rootDir: apps/web
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    plan: starter
    autoDeploy: true
    envVars:
      # IMPORTANT: after the first deploy, set this to the API service URL,
      # e.g. https://drug-cell-viz-api.onrender.com. NEXT_PUBLIC_* vars are
      # read at *build* time, so update + redeploy the web service once the
      # API is live and has its hostname.
      - key: NEXT_PUBLIC_API_URL
        sync: false   # dashboard-managed; not baked into git
      - key: NODE_VERSION
        value: "20"

# --- Managed data services ---
databases:
  - name: drug-cell-viz-db
    plan: free
    postgresMajorVersion: "16"
